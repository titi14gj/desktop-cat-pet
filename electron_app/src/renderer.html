<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' file:; media-src 'self' file:; style-src 'self'; script-src 'self';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>桌面猫宠物</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="pet-window">
    <main id="pet-surface">
      <section id="stage">
        <img id="image-player" alt="" draggable="false" />
        <video id="video-player" muted loop playsinline></video>
        <div id="empty-state">右键添加透明素材</div>
        <div id="window-frame" hidden>
          <span id="window-size-badge">320 x 320 px</span>
          <span id="lock-badge" hidden>已锁定</span>
        </div>
      </section>
    </main>
    <script src="./renderer.js"></script>
  </body>
</html>
