<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' file:; media-src 'self' file:; style-src 'self' 'unsafe-inline'; script-src 'self';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>桌面猫宠物</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="pet-surface">
      <section id="stage">
        <img id="image-player" alt="" draggable="false" />
        <video id="video-player" muted loop playsinline></video>
        <div id="empty-state">右键添加透明素材</div>
      </section>

      <aside id="settings" hidden>
        <header>
          <strong>素材库</strong>
          <button id="close-settings" type="button">关闭</button>
        </header>

        <div class="toolbar">
          <button id="add-media" type="button">添加素材</button>
          <button id="remove-media" type="button">移除</button>
        </div>

        <div class="library">
          <ul id="media-list"></ul>
          <div id="preview">
            <img id="preview-image" alt="" />
            <video id="preview-video" muted loop playsinline></video>
          </div>
        </div>

        <label>
          播放方式
          <select id="playback-mode">
            <option value="single">单个播放</option>
            <option value="sequential">顺序轮播</option>
            <option value="shuffle">随机轮播</option>
          </select>
        </label>

        <label>
          轮播间隔
          <input id="rotate-seconds" type="number" min="5" max="3600" step="5" />
        </label>

        <label>
          窗口大小
          <input id="pet-size" type="range" min="96" max="720" />
        </label>

        <label>
          播放速度
          <input id="play-speed" type="range" min="0.25" max="2" step="0.05" />
        </label>

        <label class="check">
          <input id="always-on-top" type="checkbox" />
          始终置顶
        </label>

        <button id="quit" type="button">退出应用</button>
      </aside>
    </main>
    <script src="./renderer.js"></script>
  </body>
</html>
